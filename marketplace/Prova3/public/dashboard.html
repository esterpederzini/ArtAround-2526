<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard – ArtAround</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg aa-navbar">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Art<span>Around</span></a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="/dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/editor-visita">Editor Visita</a></li>
        <li class="nav-item"><a class="nav-link" href="/editor-item">Nuovo Item</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <span id="utenteInfo" class="text-white-50 small"></span>
        <button class="btn-login aa-navbar" id="btnLogin" onclick="window.location='/'">
          <i class="bi bi-person"></i> Accedi
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4 flex-grow-1">
  <div class="row g-4">

    <!-- SIDEBAR FILTRI -->
    <div class="col-lg-2 col-md-3">
      <div class="aa-sidebar">
        <div class="aa-sidebar-title"><i class="bi bi-funnel"></i> Filtri</div>

        <!-- Museo -->
        <div class="mb-3">
          <div class="aa-sidebar-title" style="font-size:0.7rem">Museo</div>
          <div id="filtroMusei">
            <button class="aa-filter-btn active" data-museo="">Tutti</button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Linguaggio -->
        <div class="mb-3">
          <div class="aa-sidebar-title" style="font-size:0.7rem">Linguaggio</div>
          <button class="aa-filter-btn active" data-lang="">Tutti</button>
          <button class="aa-filter-btn" data-lang="elementare">Elementare</button>
          <button class="aa-filter-btn" data-lang="intermedio">Intermedio</button>
          <button class="aa-filter-btn" data-lang="avanzato">Avanzato</button>
          <button class="aa-filter-btn" data-lang="specialistico">Specialistico</button>
        </div>

        <div class="divider"></div>

        <!-- Prezzo -->
        <div class="mb-3">
          <div class="aa-sidebar-title" style="font-size:0.7rem">Prezzo</div>
          <button class="aa-filter-btn active" data-prezzo="">Tutti</button>
          <button class="aa-filter-btn" data-prezzo="free">Gratuiti</button>
          <button class="aa-filter-btn" data-prezzo="paid">A pagamento</button>
        </div>

        <div class="divider"></div>

        <!-- Categoria -->
        <div class="mb-3">
          <div class="aa-sidebar-title" style="font-size:0.7rem">Categoria</div>
          <button class="aa-filter-btn active" data-cat="">Tutte</button>
          <button class="aa-filter-btn" data-cat="pittura">Pittura</button>
          <button class="aa-filter-btn" data-cat="scultura">Scultura</button>
          <button class="aa-filter-btn" data-cat="decorativa">Decorativa</button>
          <button class="aa-filter-btn" data-cat="arte_antica">Arte Antica</button>
          <button class="aa-filter-btn" data-cat="altro">Altro</button>
        </div>

        <div class="divider"></div>

        <button class="btn-aa-outline w-100" onclick="resetFiltri()" style="font-size:0.8rem">
          <i class="bi bi-x-circle"></i> Reset
        </button>
      </div>

      <!-- Log Vendite (solo autori) -->
      <div class="aa-sidebar mt-3 d-none" id="sidebarLog">
        <div class="aa-sidebar-title"><i class="bi bi-receipt"></i> Log Vendite</div>
        <button class="btn-aa-outline w-100" style="font-size:0.8rem" onclick="apriLogModal()">
          <i class="bi bi-table"></i> Visualizza Log
        </button>
      </div>
    </div>

    <!-- CONTENUTO PRINCIPALE -->
    <div class="col-lg-10 col-md-9">

      <!-- TABS -->
      <div class="aa-tabs" id="tabsMain">
        <button class="aa-tab active" data-tab="items" onclick="switchTab('items', this)">
          <i class="bi bi-collection"></i> Catalogo Item
        </button>
        <button class="aa-tab" data-tab="visite" id="tabVisiteBtn" onclick="switchTab('visite', this)">
          <i class="bi bi-map"></i> Visite
        </button>
        <button class="aa-tab" data-tab="miei" id="tabMieiBtn" onclick="switchTab('miei', this)">
          <i class="bi bi-person-lines-fill"></i> I Miei Contenuti
        </button>
      </div>

      <!-- BARRA RICERCA -->
      <div class="d-flex gap-2 mb-4 flex-wrap align-items-center">
        <div class="aa-search-wrap flex-grow-1">
          <i class="bi bi-search search-icon"></i>
          <input type="text" id="campoCerca" class="aa-input" placeholder="Cerca per titolo, autore, opera ID...">
        </div>
        <select id="selectLimit" class="aa-select" style="width:auto">
          <option value="12">12/pag</option>
          <option value="24">24/pag</option>
          <option value="48">48/pag</option>
        </select>
        <a href="/editor-item" class="btn-aa-primary" id="btnNuovoItem">
          <i class="bi bi-plus"></i> Nuovo Item
        </a>
      </div>

      <!-- TAB: ITEMS -->
      <div id="tabItems">
        <div id="itemsGrid" class="row g-3">
          <div class="col-12 text-center py-5"><div class="aa-spinner"></div> Caricamento...</div>
        </div>
        <div id="paginazioneItems" class="aa-pagination"></div>
      </div>

      <!-- TAB: VISITE -->
      <div id="tabVisite" class="d-none">
        <div class="aa-section-header">
          <div></div>
          <a href="/editor-visita" class="btn-aa-primary">
            <i class="bi bi-plus"></i> Nuova Visita
          </a>
        </div>
        <div id="visiteGrid" class="row g-3">
          <div class="col-12 text-center py-5"><div class="aa-spinner"></div></div>
        </div>
        <div id="paginazioneVisite" class="aa-pagination"></div>
      </div>

      <!-- TAB: MIEI CONTENUTI -->
      <div id="tabMiei" class="d-none">
        <div id="mieiContenuti">
          <div class="aa-empty">
            <div class="aa-empty-icon">🔐</div>
            <h5>Accesso richiesto</h5>
            <p>Effettua il login per vedere i tuoi contenuti.</p>
            <a href="/" class="btn-aa-primary">Vai al login</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL DETTAGLIO ITEM -->
<div id="itemModal" class="aa-modal-overlay d-none">
  <div class="aa-modal" style="max-width:640px">
    <div class="aa-modal-header">
      <h4 id="modalItemTitolo">–</h4>
      <button class="aa-modal-close" onclick="chiudiItemModal()">✕</button>
    </div>
    <div class="aa-modal-body" id="modalItemBody"></div>
    <div class="aa-modal-footer" id="modalItemFooter"></div>
  </div>
</div>

<!-- MODAL LOG VENDITE -->
<div id="logModal" class="aa-modal-overlay d-none">
  <div class="aa-modal" style="max-width:780px">
    <div class="aa-modal-header">
      <h4><i class="bi bi-receipt"></i> Log Vendite & Adozioni</h4>
      <button class="aa-modal-close" onclick="document.getElementById('logModal').classList.add('d-none')">✕</button>
    </div>
    <div class="aa-modal-body">
      <div id="logBody"><div class="aa-spinner"></div></div>
    </div>
  </div>
</div>

<div class="aa-toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
