<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editor Item – ArtAround</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg aa-navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Art<span>Around</span></a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item">
              <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/editor-visita">Editor Visita</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/editor-item">Nuovo Item</a>
            </li>
          </ul>
          <span id="utenteInfo" class="text-white-50 small me-3"></span>
        </div>
      </div>
    </nav>

    <div class="container py-4 flex-grow-1">
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="aa-card">
            <div class="aa-card-header">
              <i class="bi bi-plus-circle"></i>
              <span id="formTitolo"> Nuovo Contenuto (Item)</span>
            </div>
            <div class="aa-card-body">
              <div class="aa-sidebar-title" style="font-size: 0.72rem">
                <i class="bi bi-fingerprint"></i> Identificazione Opera
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <div class="aa-form-group">
                    <label class="aa-label"
                      >Opera ID <span class="required">*</span></label
                    >
                    <input
                      type="text"
                      id="operaId"
                      class="aa-input"
                      placeholder="Es. ME-001"
                    />
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="aa-form-group">
                    <label class="aa-label"
                      >Museo <span class="required">*</span></label
                    >
                    <input
                      type="text"
                      id="museo"
                      class="aa-input"
                      placeholder="Nome museo"
                      list="museiList"
                    />
                    <datalist id="museiList"></datalist>
                  </div>
                </div>
              </div>

              <div class="divider"></div>

              <div class="aa-sidebar-title" style="font-size: 0.72rem">
                <i class="bi bi-bank"></i> Dettagli Storico-Artistici (Scheda
                Tecnica)
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <div class="aa-form-group">
                    <label class="aa-label">Artista / Maestranze</label>
                    <input
                      type="text"
                      id="artista"
                      class="aa-input"
                      placeholder="Es. Maestranze Reali"
                    />
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="aa-form-group">
                    <label class="aa-label">Stile</label>
                    <input
                      type="text"
                      id="stile"
                      class="aa-input"
                      placeholder="Es. Arte Ramesside"
                    />
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="aa-form-group">
                    <label class="aa-label">Periodo</label>
                    <input
                      type="text"
                      id="periodo"
                      class="aa-input"
                      placeholder="Es. XIX Dinastia"
                    />
                  </div>
                </div>
              </div>

              <div class="divider"></div>

              <div class="aa-sidebar-title" style="font-size: 0.72rem">
                <i class="bi bi-info-circle"></i> Informazioni Principali
              </div>
              <div class="row g-3 mb-3">
                <div class="col-12">
                  <div class="aa-form-group">
                    <label class="aa-label"
                      >Titolo <span class="required">*</span></label
                    >
                    <input
                      type="text"
                      id="titolo"
                      class="aa-input"
                      placeholder="Es. Statua di Ramesse II"
                    />
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="aa-form-group">
                    <label class="aa-label"
                      >Autore Contenuto <span class="required">*</span></label
                    >
                    <select id="autore_visita" class="aa-select">
                      <option value="">Seleziona autore...</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="aa-form-group">
                    <label class="aa-label">Categoria</label>
                    <select id="categoria" class="aa-select">
                      <option value="pittura">Pittura</option>
                      <option value="scultura">Scultura</option>
                      <option value="archeologia">Archeologia</option>
                      <option value="manoscritto">Manoscritto</option>
                      <option value="altro">Altro</option>
                    </select>
                  </div>
                </div>
                <div class="col-12">
                  <div class="aa-form-group">
                    <label class="aa-label"
                      >Testo / Descrizione
                      <span class="required">*</span></label
                    >
                    <textarea
                      id="descrizione"
                      class="aa-textarea"
                      rows="5"
                      placeholder="Il contenuto testuale..."
                    ></textarea>
                  </div>
                </div>
              </div>

              <div class="divider"></div>

              <div class="aa-sidebar-title" style="font-size: 0.72rem">
                <i class="bi bi-tags"></i> Metadati App
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <div class="aa-form-group">
                    <label class="aa-label"
                      >Lunghezza <span class="required">*</span></label
                    >
                    <select id="lunghezza" class="aa-select">
                      <option value="3s">3 secondi</option>
                      <option value="15s">15 secondi</option>
                      <option value="40s">40 secondi</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="aa-form-group">
                    <label class="aa-label"
                      >Linguaggio <span class="required">*</span></label
                    >
                    <select id="linguaggio" class="aa-select">
                      <option value="infantile">Infantile</option>
                      <option value="medio" selected>Medio</option>
                      <option value="avanzato">Avanzato</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="aa-card mb-3">
            <div class="aa-card-header">
              <i class="bi bi-cloud-upload"></i> Pubblicazione
            </div>
            <div class="aa-card-body">
              <div class="aa-form-group">
                <label class="aa-label"
                  >Licenza <span class="required">*</span></label
                >
                <select id="licenzaTipo" class="aa-select">
                  <option value="CC-BY">CC-BY</option>
                  <option value="CC-BY-SA">CC-BY-SA</option>
                  <option value="proprietario">Proprietario</option>
                </select>
              </div>
              <div class="aa-form-group">
                <label class="aa-label">Prezzo (€)</label>
                <input
                  type="number"
                  id="prezzo"
                  class="aa-input"
                  value="0"
                  step="0.01"
                />
              </div>
              <button class="btn-aa-primary w-100 mb-2" onclick="salvaItem()">
                Salva Item
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/editor-item.js"></script>
  </body>
</html>
